<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>バーコード登録</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    display: flex; flex-direction: column;
    height: 100dvh;
    padding: 8px calc(8px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));
    gap: 8px;
  }

  /* カメラ：正方形でスッキリ、画面幅にフィット */
  #reader { width: 100%; max-width: 360px; aspect-ratio: 1 / 1; margin: 0 auto;
            background: #000; border-radius: 14px; overflow: hidden; position: relative; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; display: block; }
  #reader img { display: none; }                 /* ライブラリ既定のロゴ等を隠す */
  #startbtn { display: none; width: 100%; max-width: 360px; margin: 0 auto;
              padding: 14px; font-size: 16px; font-weight: 600; border: 0; border-radius: 12px;
              background: #2563eb; color: #fff; }

  #status { padding: 10px 12px; border-radius: 10px; background: #eee; font-size: 14px; text-align: center; }
  #status.ok { background: #d6f5e3; }
  #status.ng { background: #fbe0e0; }

  /* 品名 / メモ 入力 */
  #itembar { display: none; }
  #itembar .for { font-size: 12px; color: #888; margin: 0 2px 4px; }
  #itembar .fields { display: flex; flex-direction: column; gap: 6px; }
  #itembar .line { display: flex; gap: 6px; }
  #itembar input { flex: 1; padding: 11px; font-size: 16px; border: 1px solid #bbb; border-radius: 10px; min-width: 0; }
  #save { padding: 0 18px; font-size: 15px; font-weight: 600; border: 0; border-radius: 10px; background: #28a86a; color: #fff; white-space: nowrap; }

  /* 履歴：残りスペースをスクロール */
  #history { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
             list-style: none; padding: 0; margin: 0; }
  #history li { display: flex; justify-content: space-between; gap: 8px;
                padding: 8px 10px; border-bottom: 1px solid #ddd; font-size: 13px; }
  #history li .c { overflow: hidden; text-overflow: ellipsis; }
  #history li .it { color: #2a8f5e; }
  #history li .p { font-weight: 600; white-space: nowrap; }
</style>
</head>
<body>
  <div id="status">カメラを準備中…</div>
  <div id="reader"></div>
  <button id="startbtn">カメラ開始</button>

  <div id="itembar">
    <div class="for" id="itemfor"></div>
    <div class="fields">
      <div class="line">
        <input id="item" type="text" placeholder="品名 (Item)" autocomplete="off" enterkeyhint="next">
      </div>
      <div class="line">
        <input id="note" type="text" placeholder="メモ (Note)" autocomplete="off" enterkeyhint="done">
        <button id="save">保存</button>
      </div>
    </div>
  </div>

  <ul id="history"></ul>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // ★ Apps Scriptをデプロイして得た「ウェブアプリのURL(/exec)」
    var EXEC_URL = "https://script.google.com/macros/s/AKfycbzZcoNdoSZOLGzhHHP7gSYnPHmH8V3SEI2B30KgQa8aaDZzjoq_GYpWAgRklH-ASXJa/exec";

    var statusEl = document.getElementById('status');
    var historyEl = document.getElementById('history');
    var itembar = document.getElementById('itembar');
    var itemFor = document.getElementById('itemfor');
    var itemInput = document.getElementById('item');
    var noteInput = document.getElementById('note');
    var startBtn = document.getElementById('startbtn');

    var seen = {}, count = 0;       // 登録済み(または送信中)の管理番号。二重登録を防ぐ
    var liByCode = {};              // 管理番号 -> 履歴行(li)
    var currentCode = null;         // 今、品名/メモ入力の対象になっている管理番号

    function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = cls || ''; }

    // Apps Script(/exec)をJSONPで呼ぶ共通関数
    function jsonp(params, onOk, onErr) {
      var cbName = 'cb' + Date.now() + Math.floor(Math.random() * 1000);
      var s = document.createElement('script');
      var q = 'callback=' + cbName;
      for (var k in params) q += '&' + k + '=' + encodeURIComponent(params[k]);
      window[cbName] = function (res) { delete window[cbName]; s.remove(); onOk(res); };
      s.onerror = function () { delete window[cbName]; s.remove(); if (onErr) onErr(); };
      s.src = EXEC_URL + '?' + q;
      document.body.appendChild(s);
    }

    function onScan(text) {
      if (seen[text]) { setStatus('登録済み: ' + text, ''); return; }  // 写し続けても無視
      seen[text] = true;
      register(text);
    }

    function register(code) {
      setStatus('登録中… ' + code, '');
      jsonp({ code: code }, function (res) {
        if (res && res.ok) {
          addHistory(res.code, res.price);
          var p = (res.price === null || res.price === undefined) ? '（価格未登録）' : 'NT$ ' + res.price;
          setStatus('登録: ' + res.code + ' / ' + p + ' ― 品名/メモを入力できます', 'ok');
          if (navigator.vibrate) navigator.vibrate(80);
          openInput(res.code);
        } else {
          delete seen[code];
          setStatus('エラー: ' + ((res && res.error) || '不明'), 'ng');
        }
      }, function () {
        delete seen[code];
        setStatus('通信エラー（URLを確認）', 'ng');
      });
    }

    function addHistory(code, price) {
      count++;
      var li = document.createElement('li');
      var p = (price === null || price === undefined) ? '—' : 'NT$ ' + price;
      li.innerHTML = '<span class="c">' + count + '. ' + code + ' <span class="it"></span></span>' +
                     '<span class="p">' + p + '</span>';
      historyEl.insertBefore(li, historyEl.firstChild);
      liByCode[code] = li;
    }

    function openInput(code) {
      currentCode = code;
      itemFor.textContent = code + ' の品名・メモ';
      itemInput.value = ''; noteInput.value = '';
      itembar.style.display = 'block';
      itemInput.focus();
    }

    function saveFields() {
      var code = currentCode;
      if (!code) return;
      var item = itemInput.value.trim();
      var note = noteInput.value.trim();
      if (!item && !note) { setStatus('品名・メモが空です', 'ng'); return; }
      var params = { code: code };
      if (item) params.item = item;             // 空欄は送らない＝既存値を消さない
      if (note) params.note = note;
      setStatus('保存中… ' + code, '');
      jsonp(params, function (res) {
        if (res && res.ok) {
          var li = liByCode[code];
          if (li) {
            var t = [];
            if (res.item) t.push(res.item);
            if (res.note) t.push('(' + res.note + ')');
            li.querySelector('.it').textContent = t.length ? '／ ' + t.join(' ') : '';
          }
          setStatus('保存しました: ' + code, 'ok');
        } else {
          setStatus('保存エラー: ' + ((res && res.error) || '不明'), 'ng');
        }
      }, function () { setStatus('通信エラー（保存）', 'ng'); });
    }

    document.getElementById('save').addEventListener('click', saveFields);
    // 品名でEnter→メモへ、メモでEnter→保存
    itemInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); noteInput.focus(); } });
    noteInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); saveFields(); } });

    // ===== カメラ =====
    var html5 = new Html5Qrcode("reader", {
      formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.CODE_128],
      verbose: false
    });
    var camConfig = {
      fps: 10,
      qrbox: function (vw, vh) { var m = Math.floor(Math.min(vw, vh) * 0.8); return { width: m, height: m }; }
    };
    function startCamera() {
      html5.start({ facingMode: "environment" }, camConfig, onScan, function () {})
        .then(function () { startBtn.style.display = 'none'; setStatus('スキャンしてください', ''); })
        .catch(function () { startBtn.style.display = 'block'; setStatus('「カメラ開始」を押してください', ''); });
    }
    startBtn.addEventListener('click', startCamera);
    startCamera();   // 自動起動。iOS等でブロックされたらボタンで起動
  </script>
</body>
</html>
